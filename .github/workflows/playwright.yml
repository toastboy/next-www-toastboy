name: Playwright Tests
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
            - name: Install dependencies
              run: npm ci
            - name: Load secrets from 1Password and export to environment
              uses: 1password/load-secrets-action@v4
              with:
                  export-env: true
              env:
                  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
                  DATABASE_PASSWORD: op://next-www-toastboy/DATABASE_PASSWORD/password
                  DATABASE_URL: op://next-www-toastboy/DATABASE_URL/Section_4wa3sl6ppxfmyj6xihxrpgbctq/connection string
                  AZURE_TENANT_ID: op://next-www-toastboy/AZURE_TENANT_ID/Section_ylvm7oce47qvgs6ntrhrja2mbm/uuid
                  STORAGE_CLIENT_ID: op://next-www-toastboy/App - Storage/client-id
                  STORAGE_CLIENT_SECRET: op://next-www-toastboy/App - Storage/client-secret
                  BETTER_AUTH_SECRET: op://next-www-toastboy/BETTER_AUTH_SECRET/Section_d2yvz3djw6em7hapssycamzp6m/auth secret
                  AUTH_GOOGLE_CLIENT_ID: op://next-www-toastboy/AUTH_GOOGLE_CLIENT_ID/Section_y62ddyjq6qqk3jlsynpk74njzy/client id
                  AUTH_GOOGLE_CLIENT_SECRET: op://next-www-toastboy/AUTH_GOOGLE_CLIENT_SECRET/Section_46qnuzd357u5kz6tcsb5igjfqu/secret
                  AUTH_MICROSOFT_CLIENT_ID: op://next-www-toastboy/App - Auth/client-id
                  AUTH_MICROSOFT_CLIENT_SECRET: op://next-www-toastboy/App - Auth/client-secret
                  SENTRY_AUTH_TOKEN: op://next-www-toastboy/SENTRY_AUTH_TOKEN/Section_vi2z4utsexivhdrvq7jpproi5a/auth token
            - name: Configure local DATABASE_URL for CI
              env:
                  DATABASE_PASSWORD: ${{ env.DATABASE_PASSWORD }}
              run: |
                  python3 - <<'PY' "$GITHUB_ENV"
                  import os, sys
                  env_path = sys.argv[1]
                  password = os.environ["DATABASE_PASSWORD"]
                  with open(env_path, "a", encoding="utf-8") as fh:
                      fh.write(f"DATABASE_URL=mysql://root:{password}@127.0.0.1:33306/footy\n")
                  PY
            - name: Start docker stack (database, mailpit, etc.)
              env:
                  DATABASE_PASSWORD: ${{ env.DATABASE_PASSWORD }}
              run: docker compose up -d
            - name: Wait for database
              run: |
                  for i in {1..30}; do
                    if [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q db))" = "healthy" ]; then
                      exit 0
                    fi
                    sleep 2
                  done
                  docker compose logs db
                  exit 1
            - name: Push Prisma schema
              run: npx prisma db push
            - name: Seed database (verbose, fail-fast)
              run: |
                  set -euo pipefail
                  npx prisma generate
                  stdbuf -oL -eL npx tsx --tsconfig tsconfig.scripts.json -r tsconfig-paths/register prisma/seed.ts
            - name: Build Next.js app
              run: npm run build
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
            - name: Run Playwright tests
              env:
                  DATABASE_URL: ${{ env.DATABASE_URL }}
                  DATABASE_PASSWORD: ${{ env.DATABASE_PASSWORD }}
                  AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
                  STORAGE_CLIENT_ID: ${{ env.STORAGE_CLIENT_ID }}
                  STORAGE_CLIENT_SECRET: ${{ env.STORAGE_CLIENT_SECRET }}
                  BETTER_AUTH_SECRET: ${{ env.BETTER_AUTH_SECRET }}
                  AUTH_GOOGLE_CLIENT_ID: ${{ env.AUTH_GOOGLE_CLIENT_ID }}
                  AUTH_GOOGLE_CLIENT_SECRET: ${{ env.AUTH_GOOGLE_CLIENT_SECRET }}
                  AUTH_MICROSOFT_CLIENT_ID: ${{ env.AUTH_MICROSOFT_CLIENT_ID }}
                  AUTH_MICROSOFT_CLIENT_SECRET: ${{ env.AUTH_MICROSOFT_CLIENT_SECRET }}
                  SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
              run: npx playwright test
            - uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

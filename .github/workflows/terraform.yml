name: Terraform

on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
    TF_PLUGIN_CACHE_DIR: .terraform.d/plugin-cache

    TF_VAR_github_repository: '"${{ github.repository }}"'
    TF_VAR_github_run_id: '"${{ github.run_id }}"'
    TF_VAR_github_server_url: '"${{ github.server_url }}"'
    TF_VAR_github_sha: '"${{ github.sha }}"'

jobs:
    terraform:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Ensure TF plugin cache dir exists
              run: mkdir -p .terraform.d/plugin-cache

            - name: Cache Terraform plugin dir
              uses: actions/cache@v5
              with:
                  path: .terraform.d/plugin-cache
                  key: tf-plugins-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
                  restore-keys: |
                      tf-plugins-${{ runner.os }}-

            - name: Load secrets from 1Password and export to environment
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
              uses: 1password/load-secrets-action@v4
              with:
                  export-env: true
              env:
                  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
                  TF_VAR_azure_tenant_id: "op://next-www-toastboy/Terraform/tenant id"
                  TF_VAR_azure_subscription_id: "op://next-www-toastboy/Terraform/subscription id"
                  TF_VAR_azure_client_id: "op://next-www-toastboy/Terraform/username"
                  TF_VAR_azure_client_secret: "op://next-www-toastboy/Terraform/credential"

            - name: Terraform Plan (Internal PRs)
              if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
              uses: dflook/terraform-plan@v2
              with:
                  path: terraform
                  workspace: next-www-toastboy

            - name: Terraform Apply (main)
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: dflook/terraform-apply@v2
              with:
                  path: terraform
                  workspace: next-www-toastboy
                  auto_approve: true

            - name: Get Terraform Outputs
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              id: tf_output
              uses: dflook/terraform-output@v2
              with:
                  path: terraform
                  workspace: next-www-toastboy

            - name: Install 1Password CLI
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: 1password/install-cli-action@v1

            - name: Sync Terraform outputs to 1Password
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              env:
                  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
                  AUTH_CLIENT_ID: ${{ steps.tf_output.outputs.auth_client_id }}
                  AUTH_CLIENT_SECRET: ${{ steps.tf_output.outputs.auth_client_secret }}
                  STORAGE_CLIENT_ID: ${{ steps.tf_output.outputs.storage_client_id }}
                  STORAGE_CLIENT_SECRET: ${{ steps.tf_output.outputs.storage_client_secret }}
                  MAIL_CLIENT_ID: ${{ steps.tf_output.outputs.mail_client_id }}
                  MAIL_CLIENT_SECRET: ${{ steps.tf_output.outputs.mail_client_secret }}
              run: |
                  VAULT="next-www-toastboy"

                  VALID_FROM=$(date -u +%Y-%m-%d)
                  EXPIRES=$(date -u -d "+5 years" +%Y-%m-%d)

                  upsert_item() {
                    local title="$1" client_id="$2" client_secret="$3" notes="$4"
                    if op item get "$title" --vault "$VAULT" --format json > /dev/null 2>&1 < /dev/null; then
                      op item edit "$title" --vault "$VAULT" \
                        "username=$client_id" \
                        "credential=$client_secret" \
                        "validFrom[date]=$VALID_FROM" \
                        "expires[date]=$EXPIRES" \
                        "notesPlain=$notes" \
                        < /dev/null
                    else
                      op item template get "API Credential" \
                        | jq --arg t "$title" --arg u "$client_id" --arg p "$client_secret" \
                             --arg vf "$VALID_FROM" --arg ex "$EXPIRES" --arg n "$notes" \
                          '.title = $t | .fields[] |= if .id == "username" then .value = $u
                            elif .id == "credential" then .value = $p
                            elif .id == "validFrom" then .value = $vf
                            elif .id == "expires" then .value = $ex
                            elif .id == "notesPlain" then .value = $n
                            else . end' \
                        | op item create --vault "$VAULT"
                    fi
                  }

                  upsert_item "App - Auth" "$AUTH_CLIENT_ID" "$AUTH_CLIENT_SECRET" \
                    "Microsoft Entra app registration for Better Auth Microsoft social login (AUTH_MICROSOFT_CLIENT_ID / AUTH_MICROSOFT_CLIENT_SECRET). Delegated OIDC scopes only (openid, profile, email, User.Read). Managed automatically by the Terraform workflow in .github/workflows/terraform.yml — do not edit the client ID or secret manually."

                  upsert_item "App - Storage" "$STORAGE_CLIENT_ID" "$STORAGE_CLIENT_SECRET" \
                    "Microsoft Entra app registration for Azure Blob Storage access via RBAC (STORAGE_CLIENT_ID / STORAGE_CLIENT_SECRET). Used by the Next.js app to read/write blobs in the db-seed, mugshots, clubs and countries containers. No Graph permissions. Managed automatically by the Terraform workflow in .github/workflows/terraform.yml — do not edit the client ID or secret manually."

                  upsert_item "App - Mail" "$MAIL_CLIENT_ID" "$MAIL_CLIENT_SECRET" \
                    "Microsoft Entra app registration for sending transactional email via Microsoft Graph API (MAIL_GRAPH_CLIENT_ID / MAIL_GRAPH_CLIENT_SECRET). Holds the Mail.Send application permission with admin consent, allowing it to send as any mailbox — keep this credential isolated and rotate promptly if compromised. Managed automatically by the Terraform workflow in .github/workflows/terraform.yml — do not edit the client ID or secret manually."

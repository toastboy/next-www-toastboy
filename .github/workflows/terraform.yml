name: Terraform

on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
    TF_PLUGIN_CACHE_DIR: .terraform.d/plugin-cache

    TF_VAR_github_repository: '"${{ github.repository }}"'
    TF_VAR_github_run_id: '"${{ github.run_id }}"'
    TF_VAR_github_server_url: '"${{ github.server_url }}"'
    TF_VAR_github_sha: '"${{ github.sha }}"'

jobs:
    terraform:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Ensure TF plugin cache dir exists
              run: mkdir -p .terraform.d/plugin-cache

            - name: Cache Terraform plugin dir
              uses: actions/cache@v5
              with:
                  path: .terraform.d/plugin-cache
                  key: tf-plugins-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
                  restore-keys: |
                      tf-plugins-${{ runner.os }}-

            - name: Load secrets from 1Password and export to environment
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
              uses: 1password/load-secrets-action@v4
              with:
                  export-env: true
              env:
                  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
                  TF_VAR_azure_tenant_id: op://next-www-toastboy/TF_AZURE_TENANT_ID/Section_elpyzkswpwjdt45ytdpuj4zpri/uuid
                  TF_VAR_azure_subscription_id: op://next-www-toastboy/AZURE_SUBSCRIPTION_ID/Section_u2slseexl7iz6qq3ab3kwfut5u/uuid
                  TF_VAR_azure_client_id: op://next-www-toastboy/TF_AZURE_CLIENT_ID/Section_sbgupoixcvisaemyfdnssgod3u/uuid
                  TF_VAR_azure_client_secret: op://next-www-toastboy/TF_AZURE_CLIENT_SECRET/Section_al3t4lplsritwudt5bbhjxh4e4/uuid

            - name: Terraform Plan (Internal PRs)
              if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
              uses: dflook/terraform-plan@v2
              with:
                  path: terraform
                  workspace: next-www-toastboy

            - name: Terraform Apply (main)
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: dflook/terraform-apply@v2
              with:
                  path: terraform
                  workspace: next-www-toastboy
                  auto_approve: true

            - name: Get Terraform Outputs
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              id: tf_output
              uses: dflook/terraform-output@v2
              with:
                  path: terraform
                  workspace: next-www-toastboy

            - name: Install 1Password CLI
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: 1password/install-cli-action@v1

            - name: Sync Terraform outputs to 1Password
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              env:
                  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
                  AUTH_CLIENT_ID: ${{ steps.tf_output.outputs.auth_client_id }}
                  AUTH_CLIENT_SECRET: ${{ steps.tf_output.outputs.auth_client_secret }}
                  STORAGE_CLIENT_ID: ${{ steps.tf_output.outputs.storage_client_id }}
                  STORAGE_CLIENT_SECRET: ${{ steps.tf_output.outputs.storage_client_secret }}
                  MAIL_CLIENT_ID: ${{ steps.tf_output.outputs.mail_client_id }}
                  MAIL_CLIENT_SECRET: ${{ steps.tf_output.outputs.mail_client_secret }}
              run: |
                  VAULT="next-www-toastboy"

                  upsert_item() {
                    local title="$1" client_id="$2" client_secret="$3"
                    if op item get "$title" --vault "$VAULT" --format json > /dev/null 2>&1 < /dev/null; then
                      op item edit "$title" --vault "$VAULT" \
                        "username=$client_id" \
                        "password=$client_secret" \
                        < /dev/null
                    else
                      printf '{"title":"%s","category":"LOGIN","fields":[{"id":"username","type":"STRING","label":"username","value":"%s"},{"id":"password","type":"CONCEALED","label":"password","value":"%s"}]}' \
                        "$title" "$client_id" "$client_secret" \
                        | op item create --vault "$VAULT"
                    fi
                  }

                  upsert_item "App - Auth"    "$AUTH_CLIENT_ID"    "$AUTH_CLIENT_SECRET"
                  upsert_item "App - Storage" "$STORAGE_CLIENT_ID" "$STORAGE_CLIENT_SECRET"
                  upsert_item "App - Mail"    "$MAIL_CLIENT_ID"    "$MAIL_CLIENT_SECRET"
